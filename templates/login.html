<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login — Otopia Payslip</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: #f0f4f8;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .login-wrapper {
      width: 100%;
      max-width: 400px;
      padding: 20px;
    }

    .logo-block {
      text-align: center;
      margin-bottom: 28px;
    }
    .logo-icon {
      width: 56px; height: 56px;
      background: #1a3c5e;
      border-radius: 14px;
      display: inline-flex;
      align-items: center; justify-content: center;
      font-size: 26px; font-weight: 900;
      color: #d0e8f5;
      margin-bottom: 12px;
    }
    .logo-block h1 {
      font-size: 20px; font-weight: 800;
      color: #1a2b3c; letter-spacing: .3px;
    }
    .logo-block p {
      font-size: 13px; color: #607080;
      margin-top: 4px;
    }

    .card {
      background: white;
      border-radius: 14px;
      padding: 32px;
      box-shadow: 0 2px 16px rgba(0,0,0,.10);
    }
    .card h2 {
      font-size: 18px; font-weight: 700;
      color: #1a2b3c;
      margin-bottom: 24px;
    }

    .field { margin-bottom: 18px; }
    label {
      display: block;
      font-size: 12px; font-weight: 600;
      color: #4a6275;
      margin-bottom: 6px;
      text-transform: uppercase; letter-spacing: .5px;
    }
    input {
      width: 100%;
      padding: 11px 14px;
      border: 1.5px solid #d0dde8;
      border-radius: 8px;
      font-size: 15px;
      color: #1a2b3c;
      background: #fafcff;
      outline: none;
      transition: border-color .15s;
    }
    input:focus { border-color: #1a3c5e; background: white; }

    .error-msg {
      background: #fdecea;
      border: 1.5px solid #f5c6c2;
      border-radius: 8px;
      padding: 11px 14px;
      font-size: 13px;
      color: #c0392b;
      margin-bottom: 18px;
      display: flex; align-items: center; gap: 8px;
    }

    .btn-login {
      width: 100%;
      padding: 13px;
      background: #1a3c5e;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 15px; font-weight: 700;
      cursor: pointer;
      transition: opacity .15s, transform .1s;
      margin-top: 4px;
    }
    .btn-login:hover  { opacity: .88; }
    .btn-login:active { transform: scale(.98); }
  </style>
</head>
<body>
  <div class="login-wrapper">

    <div class="logo-block">
      <div class="logo-icon">O</div>
      <h1>OTOPIA Batam 2</h1>
      <p>Payslip Generator</p>
    </div>

    <div class="card">
      <h2>Masuk</h2>

      {% if error %}
      <div class="error-msg">⚠ {{ error }}</div>
      {% endif %}

      <form method="POST" action="/login">
        <div class="field">
          <label>Username</label>
          <input type="text" name="username" placeholder="Masukkan username"
                 autocomplete="username" autofocus required/>
        </div>
        <div class="field">
          <label>Password</label>
          <input type="password" name="password" placeholder="Masukkan password"
                 autocomplete="current-password" required/>
        </div>
        <button type="submit" class="btn-login">Masuk</button>
      </form>
    </div>

  </div>
</body>
</html>
